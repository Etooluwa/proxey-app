# Render Blueprint - Proxey App
# Docs: https://render.com/docs/blueprint-spec

services:
  # ============================================
  # Frontend - Static Site
  # ============================================
  - type: web
    name: proxey-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE
        value: https://proxeybooking-app.onrender.com/api
      - key: REACT_APP_APP_URL
        value: https://app.mykliques.com
      - key: REACT_APP_SUPABASE_URL
        value: https://iruabnazdxfmvtxhgemf.supabase.co
      - key: REACT_APP_STRIPE_PUBLISHABLE_KEY
        sync: false  # Set manually in dashboard
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false  # Set manually in dashboard

  # ============================================
  # Backend - Web Service
  # ============================================
  - type: web
    name: proxey-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: WEB_PUSH_PUBLIC_KEY
        sync: false
      - key: WEB_PUSH_PRIVATE_KEY
        sync: false
      - key: WEB_PUSH_SUBJECT
        value: mailto:info@mykliques.com
