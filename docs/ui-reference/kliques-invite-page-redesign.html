<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Great Cutz on Kliques</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
:root{--base:#FBF7F2;--ink:#3D231E;--muted:#8C6A64;--faded:#B0948F;--accent:#C25E4A;--hero:#FDDCC6;--abg:#F2EBE5;--line:rgba(140,106,100,0.18);--card:#FFF;--callout:#FFF5E6;--success:#5A8A5E;--sbg:#EBF2EC}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',system-ui,sans-serif;background:var(--base);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
button{font-family:inherit;cursor:pointer;border:none;background:none}button:active{transform:scale(0.98)}
input:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(194,94,74,0.1)!important}
::-webkit-scrollbar{display:none}
.topo{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 200 Q 100 100 200 200 T 400 200' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3Cpath d='M-50 250 Q 50 150 150 250 T 350 250' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3Cpath d='M50 150 Q 150 50 250 150 T 450 150' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3Cpath d='M0 300 Q 100 200 200 300 T 400 300' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3C/svg%3E");background-size:cover;pointer-events:none}
.wrap{width:100%;max-width:480px}
.topnav{display:flex;justify-content:center;padding:0 0 24px}
.logo{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:500;color:var(--accent)}
.inp{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);font-family:inherit;font-size:14px;color:var(--ink);outline:none;background:var(--abg);box-sizing:border-box;transition:border-color .15s,box-shadow .15s}
.lbl{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px}
.bm{width:100%;padding:18px;border-radius:14px;background:var(--ink);color:#fff;font-size:15px;font-weight:500;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}.bm:hover{opacity:.9}
.bo{width:100%;padding:16px;border-radius:14px;border:1px solid var(--line);background:transparent;font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}.bo:hover{background:var(--abg)}
.dt{display:flex;align-items:center;gap:16px;margin:16px 0}.dt span{font-size:11px;color:var(--faded);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}.dt::before,.dt::after{content:'';flex:1;height:1px;background:var(--line)}
.pt{position:absolute;right:14px;top:50%;transform:translateY(-50%);padding:4px;display:flex;cursor:pointer}
.GG{display:flex;align-items:center;justify-content:center;gap:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeUp .5s ease both}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}.pop{animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes draw{to{stroke-dashoffset:0}}.draw{animation:draw .6s ease .3s both}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="wrap" id="page"></div>

<script>
var step='landing'; // landing, signup, login, connecting, connected
var GG='<svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>';
var EY='<svg width="18" height="18" fill="none" stroke="var(--faded)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
var EO='<svg width="18" height="18" fill="none" stroke="var(--faded)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>';

function go(s){step=s;render();if(s==='connecting')setTimeout(function(){step='connected';render()},1800)}

function render(){
  var p=document.getElementById('page');
  if(step==='landing')p.innerHTML=landingHTML();
  else if(step==='signup')p.innerHTML=signupHTML();
  else if(step==='login')p.innerHTML=loginHTML();
  else if(step==='connecting')p.innerHTML=connectingHTML();
  else if(step==='connected')p.innerHTML=connectedHTML();
}

function landingHTML(){
  return '<div class="fade">'+
    '<div class="topnav"><div class="logo">kliques</div></div>'+

    // Hero card
    '<div style="background:var(--hero);border-radius:24px;padding:36px 32px;position:relative;overflow:hidden;margin-bottom:28px">'+
      '<div class="topo" style="opacity:.1;border-radius:24px"></div>'+
      '<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center">'+
        // Provider avatar
        '<div style="width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.5);border:3px solid rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative">'+
          '<span style="font-size:28px;font-weight:500;color:var(--muted)">GC</span>'+
          '<div style="position:absolute;bottom:2px;right:2px;width:22px;height:22px;border-radius:50%;background:var(--success);border:3px solid var(--hero);display:flex;align-items:center;justify-content:center"><svg width="11" height="11" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
        '</div>'+
        '<h1 style="font-size:24px;font-weight:400;letter-spacing:-0.03em;line-height:1.25;margin:0 0 8px">Great Cutz invited you<br>to join their klique.</h1>'+
        '<p style="font-size:14px;color:var(--muted);margin:0">Great Cutz · Yoga & Pilates · Abuja, Nigeria</p>'+
      '</div>'+
    '</div>'+

    // Benefits
    benefitRow('M5 13l4 4L19 7','Book sessions directly','Skip the back-and-forth. Book with Great in a few taps.')+
    benefitRow('M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9','Stay connected','Get reminders, updates, and session notes in one place.')+
    benefitRow('M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z','Secure payments','Pay safely through Stripe. No cash needed.')+

    '<div style="height:24px"></div>'+

    // CTAs
    '<button class="bm" onclick="go(\'signup\')" style="margin-bottom:10px">Accept Invite & Sign Up</button>'+
    '<button class="bo" onclick="go(\'login\')">I already have an account</button>'+

    '<p style="font-size:11px;color:var(--faded);text-align:center;margin-top:20px;line-height:1.5">By continuing, you agree to Kliques\' <span style="color:var(--accent)">Terms</span> & <span style="color:var(--accent)">Privacy Policy</span></p>'+
  '</div>';
}

function benefitRow(iconPath,title,desc){
  return '<div style="display:flex;gap:16px;padding:14px 0;align-items:flex-start">'+
    '<div style="width:40px;height:40px;border-radius:12px;background:var(--abg);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="'+iconPath+'" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
    '<div><p style="font-size:14px;font-weight:500;margin:0 0 3px">'+title+'</p><p style="font-size:13px;color:var(--muted);margin:0;line-height:1.5">'+desc+'</p></div>'+
  '</div>';
}

function signupHTML(){
  return '<div class="fade">'+
    '<div class="topnav"><button onclick="go(\'landing\')" style="position:absolute;left:0;padding:4px;display:flex"><svg width="22" height="22" fill="none" stroke="var(--ink)" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="logo">kliques</div></div>'+

    // Mini provider card
    '<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--hero);border-radius:14px;margin-bottom:28px">'+
      '<div style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--muted);flex-shrink:0;border:2px solid rgba(255,255,255,0.6)">GC</div>'+
      '<div><p style="font-size:13px;font-weight:500;margin:0">Joining Great Cutz\'s klique</p><p style="font-size:11px;color:var(--muted);margin:0">Yoga & Pilates · Abuja</p></div>'+
    '</div>'+

    '<h2 style="font-size:22px;font-weight:400;letter-spacing:-0.03em;margin:0 0 4px">Create your account</h2>'+
    '<p style="font-size:13px;color:var(--muted);margin:0 0 28px">Sign up to connect with Great Cutz</p>'+

    '<label class="lbl">Full Name</label><input class="inp" placeholder="Your name" style="margin-bottom:16px">'+
    '<label class="lbl">Email</label><input class="inp" placeholder="you@email.com" type="email" style="margin-bottom:16px">'+
    '<label class="lbl">Password</label><div style="position:relative;margin-bottom:6px"><input class="inp" id="su-pw" placeholder="Create a password" type="password"><button class="pt" onclick="tP(\'su-pw\',this)">'+EY+'</button></div>'+
    '<p style="font-size:11px;color:var(--faded);margin:0 0 24px">At least 8 characters</p>'+

    '<button class="bm" onclick="go(\'connecting\')" style="margin-bottom:0">Create Account & Connect</button>'+
    '<div class="dt"><span>or</span></div>'+
    '<button class="bo GG" onclick="go(\'connecting\')">'+GG+' Sign up with Google</button>'+

    '<div style="text-align:center;padding:20px 0"><button onclick="go(\'login\')" style="font-size:13px;color:var(--muted)">Already have an account? <span style="color:var(--accent);font-weight:500">Sign in</span></button></div>'+
  '</div>';
}

function loginHTML(){
  return '<div class="fade">'+
    '<div class="topnav"><button onclick="go(\'landing\')" style="position:absolute;left:0;padding:4px;display:flex"><svg width="22" height="22" fill="none" stroke="var(--ink)" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="logo">kliques</div></div>'+

    // Mini provider card
    '<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--hero);border-radius:14px;margin-bottom:28px">'+
      '<div style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--muted);flex-shrink:0;border:2px solid rgba(255,255,255,0.6)">GC</div>'+
      '<div><p style="font-size:13px;font-weight:500;margin:0">Joining Great Cutz\'s klique</p><p style="font-size:11px;color:var(--muted);margin:0">Yoga & Pilates · Abuja</p></div>'+
    '</div>'+

    '<h2 style="font-size:22px;font-weight:400;letter-spacing:-0.03em;margin:0 0 4px">Welcome back</h2>'+
    '<p style="font-size:13px;color:var(--muted);margin:0 0 28px">Sign in to connect with Great Cutz</p>'+

    '<label class="lbl">Email</label><input class="inp" placeholder="you@email.com" type="email" style="margin-bottom:16px">'+
    '<label class="lbl">Password</label><div style="position:relative;margin-bottom:24px"><input class="inp" id="li-pw" placeholder="Enter your password" type="password"><button class="pt" onclick="tP(\'li-pw\',this)">'+EY+'</button></div>'+

    '<button class="bm" onclick="go(\'connecting\')" style="margin-bottom:0">Sign In & Connect</button>'+
    '<div class="dt"><span>or</span></div>'+
    '<button class="bo GG" onclick="go(\'connecting\')">'+GG+' Continue with Google</button>'+

    '<div style="text-align:center;padding:20px 0"><button onclick="go(\'signup\')" style="font-size:13px;color:var(--muted)">Don\'t have an account? <span style="color:var(--accent);font-weight:500">Sign up</span></button></div>'+
  '</div>';
}

function connectingHTML(){
  return '<div class="fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center">'+
    '<div style="display:flex;align-items:center;margin-bottom:36px">'+
      '<div class="pop" style="width:68px;height:68px;border-radius:50%;background:var(--hero);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--muted);border:3px solid var(--base);z-index:2">GC</div>'+
      '<svg width="56" height="4" style="margin:0 -8px;z-index:1"><line x1="0" y1="2" x2="56" y2="2" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="56" stroke-dashoffset="56" class="draw" stroke-linecap="round"/></svg>'+
      '<div class="pop" style="width:68px;height:68px;border-radius:50%;background:var(--abg);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--muted);border:3px solid var(--base);z-index:2;animation-delay:.15s">You</div>'+
    '</div>'+
    '<h2 style="font-size:20px;font-weight:400;letter-spacing:-0.02em;margin:0 0 8px">Connecting you with Great Cutz...</h2>'+
    '<p style="font-size:14px;color:var(--faded);margin:0">This will only take a moment</p>'+
  '</div>';
}

function connectedHTML(){
  return '<div class="fade" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:20px">'+
    '<div class="topnav"><div class="logo">kliques</div></div>'+

    // Connected avatars
    '<div style="display:flex;align-items:center;margin-bottom:28px">'+
      '<div class="pop" style="width:68px;height:68px;border-radius:50%;background:var(--hero);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--muted);border:3px solid var(--base);z-index:2">GC</div>'+
      '<div style="width:56px;height:3px;margin:0 -8px;z-index:1;background:var(--accent);border-radius:2px"></div>'+
      '<div class="pop" style="width:68px;height:68px;border-radius:50%;background:var(--abg);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--muted);border:3px solid var(--base);z-index:2;animation-delay:.1s">You</div>'+
    '</div>'+

    // Success icon
    '<div class="pop" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9999px;background:var(--sbg);margin-bottom:24px;animation-delay:.2s">'+
      '<svg width="14" height="14" fill="none" stroke="var(--success)" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      '<span style="font-size:13px;font-weight:500;color:var(--success)">Connected</span>'+
    '</div>'+

    '<h1 style="font-size:24px;font-weight:400;letter-spacing:-0.02em;margin:0 0 8px">You\'re in!</h1>'+
    '<p style="font-size:15px;color:var(--muted);margin:0 0 32px;line-height:1.6;max-width:340px">You and Great Cutz are now in each other\'s klique. Your relationship starts here.</p>'+

    // What's next card
    '<div style="width:100%;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:18px;text-align:left;margin-bottom:24px">'+
      '<span class="lbl" style="margin-bottom:14px">What you can do now</span>'+
      nextRow('M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z','Browse services and book a session')+
      nextRow('M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z','Message Great Cutz directly')+
      nextRow('M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z','Watch your relationship timeline grow')+
    '</div>'+

    '<button class="bm" style="margin-bottom:10px">Book a Session</button>'+
    '<button class="bo">Go to My Kliques</button>'+
  '</div>';
}

function nextRow(iconPath,text){
  return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0">'+
    '<div style="width:32px;height:32px;border-radius:10px;background:var(--abg);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="15" height="15" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="'+iconPath+'" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
    '<span style="font-size:13px;color:var(--ink)">'+text+'</span>'+
  '</div>';
}

function tP(id,btn){var i=document.getElementById(id);if(!i)return;if(i.type==='password'){i.type='text';btn.innerHTML=EO}else{i.type='password';btn.innerHTML=EY}}

render();
</script>
</body>
</html>
