<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kliques — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
:root{--base:#FBF7F2;--ink:#3D231E;--muted:#8C6A64;--faded:#B0948F;--accent:#C25E4A;--hero:#FDDCC6;--abg:#F2EBE5;--line:rgba(140,106,100,0.18);--card:#FFF;--callout:#FFF5E6;--danger:#B04040}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',system-ui,sans-serif;background:var(--base);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
button{font-family:inherit;cursor:pointer;border:none;background:none}button:active{transform:scale(0.98)}
input:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(194,94,74,0.1)!important}
::-webkit-scrollbar{display:none}
.inp{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);font-family:'Sora',sans-serif;font-size:14px;color:var(--ink);outline:none;background:var(--abg);box-sizing:border-box;transition:border-color .15s,box-shadow .15s}
.inp.err{border-color:var(--danger)!important;box-shadow:0 0 0 3px rgba(176,64,64,0.08)!important}
.err-msg{font-size:12px;color:var(--danger);margin:6px 0 0;display:none}.err-msg.show{display:block}
.lbl{font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px}
.oc{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-radius:16px;border:1px solid var(--line);background:var(--card);cursor:pointer;transition:all .15s;width:100%;text-align:left;margin-bottom:12px}
.oc:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(194,94,74,0.06);transform:translateY(-1px)}
.dt{display:flex;align-items:center;gap:16px;margin:20px 0}.dt span{font-size:11px;color:var(--faded);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}.dt::before,.dt::after{content:'';flex:1;height:1px;background:var(--line)}
.bm{width:100%;padding:16px;border-radius:12px;background:var(--ink);color:#fff;font-size:14px;font-weight:500;transition:opacity .15s;border:none}.bm:hover{opacity:.9}
.bo{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:transparent;font-size:13px;font-weight:500;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}.bo:hover{background:var(--abg)}
.bb{position:absolute;top:28px;left:28px;padding:8px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2}.bb:hover{background:var(--abg)}
.pt{position:absolute;right:14px;top:50%;transform:translateY(-50%);padding:4px;display:flex;cursor:pointer}
.fl{display:flex;gap:24px;justify-content:center;align-items:center}.fl a{font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .15s}.fl a:hover{color:var(--accent)}
.ip{width:50%;position:relative;overflow:hidden;flex-shrink:0}.ip img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .4s}
.io{position:absolute;bottom:0;left:0;right:0;padding:32px 36px;background:linear-gradient(transparent,rgba(0,0,0,0.55));z-index:2}.io p{color:#fff;font-size:13px;line-height:1.6;margin:0;opacity:.9}.io .lg{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:#fff;margin-bottom:8px;letter-spacing:-0.02em}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeIn .3s ease both}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.shake{animation:shake .3s ease}
</style>
</head>
<body>
<div style="width:100%;max-width:1100px;min-height:640px;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(61,35,30,0.06);display:flex;border:1px solid var(--line)">
  <div style="flex:1;background:var(--card);display:flex;flex-direction:column;position:relative;min-height:640px">
    <button class="bb" id="bk" style="display:none" onclick="goBack()"><svg width="22" height="22" fill="none" stroke="var(--ink)" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <div id="fa" style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:48px 56px;max-width:520px;margin:0 auto;width:100%"></div>
    <div style="padding:20px 56px 28px"><div class="fl"><a href="#"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>English</a><a href="#"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>Help and support</a></div></div>
  </div>
  <div class="ip"><img id="pi" src="" alt=""><div class="io"><div class="lg">kliques</div><p id="pt"></p></div></div>
</div>

<script>
var S='role',FR='client',SE='';
var IM={role:'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=960&h=1200&fit=crop&crop=faces',client:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=960&h=1200&fit=crop&crop=faces',provider:'https://images.unsplash.com/photo-1580618672591-eb180b1a973f?w=960&h=1200&fit=crop&crop=faces',magic:'https://images.unsplash.com/photo-1516387938699-a93567ec168e?w=960&h=1200&fit=crop&crop=center'};
var TX={role:'Build relationships, not just bookings.',client:'Book your favourite providers in seconds.',provider:'Manage clients, bookings, and payments — all in one place.',magic:'A secure link is on its way to your inbox.'};
var GG='<svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>';
var BT='<svg width="15" height="15" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var EV='<svg width="36" height="36" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 19V9a2 2 0 011.106-1.789L12 3l7.894 4.211A2 2 0 0121 9v10a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 9l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var EY='<svg width="18" height="18" fill="none" stroke="var(--faded)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
var EO='<svg width="18" height="18" fill="none" stroke="var(--faded)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>';
var AW='<svg width="20" height="20" fill="none" stroke="var(--faded)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function sI(k){var i=document.getElementById('pi');i.style.opacity='0';setTimeout(function(){i.src=IM[k]||IM.role;i.onload=function(){i.style.opacity='1'}},150);document.getElementById('pt').textContent=TX[k]||TX.role}
function vE(e){return e&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
function goBack(){if(S==='client_signup')S='client_login';else if(S==='provider_signup')S='provider_login';else if(S==='magic_sent')S='magic_link';else if(S==='magic_link')S=FR+'_login';else S='role';R()}

function R(){
  var f=document.getElementById('fa'),b=document.getElementById('bk');
  b.style.display=S==='role'?'none':'flex';
  if(S==='role'){f.innerHTML=roleH();sI('role')}
  else if(S==='client_login'){f.innerHTML=loginH('client');sI('client')}
  else if(S==='client_signup'){f.innerHTML=signupH('client');sI('client')}
  else if(S==='provider_login'){f.innerHTML=loginH('provider');sI('provider')}
  else if(S==='provider_signup'){f.innerHTML=signupH('provider');sI('provider')}
  else if(S==='magic_link'){f.innerHTML=magicH();sI(FR)}
  else if(S==='magic_sent'){f.innerHTML=sentH();sI('magic')}
}

function roleH(){
  return '<div class="fade">'+
  '<h1 style="font-size:28px;font-weight:400;letter-spacing:-0.03em;text-align:center;margin:0 0 6px">Sign up or log in</h1>'+
  '<p style="font-size:14px;color:var(--muted);text-align:center;margin:0 0 40px">Choose how you use Kliques</p>'+
  '<button class="oc" onclick="FR=\'client\';S=\'client_login\';R()"><div><div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"><svg width="20" height="20" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 3a4 4 0 100 8 4 4 0 000-8z" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:16px;font-weight:500">Kliques for clients</span></div><p style="font-size:13px;color:var(--muted);margin:0;padding-left:30px">Book and manage your appointments</p></div>'+AW+'</button>'+
  '<button class="oc" onclick="FR=\'provider\';S=\'provider_login\';R()"><div><div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"><svg width="20" height="20" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:16px;font-weight:500">Kliques for professionals</span></div><p style="font-size:13px;color:var(--muted);margin:0;padding-left:30px">Manage and grow your business</p></div>'+AW+'</button>'+
  '</div>';
}

function loginH(role){
  var t=role==='client'?'client':'provider';
  var pid=role[0]+'l-pw';
  return '<div class="fade">'+
  '<h1 style="font-size:28px;font-weight:400;letter-spacing:-0.03em;margin:0 0 6px">Welcome back</h1>'+
  '<p style="font-size:14px;color:var(--muted);margin:0 0 32px">Sign in to your '+t+' account</p>'+
  '<label class="lbl">Email</label><input class="inp" placeholder="you@email.com" type="email" style="margin-bottom:20px">'+
  '<label class="lbl">Password</label><div style="position:relative;margin-bottom:8px"><input class="inp" id="'+pid+'" placeholder="Enter your password" type="password"><button class="pt" onclick="tP(\''+pid+'\',this)">'+EY+'</button></div>'+
  '<div style="text-align:right;margin-bottom:24px"><button onclick="FR=\''+role+'\';S=\'magic_link\';R()" style="font-size:12px;color:var(--accent);font-weight:500;padding:4px 0">Forgot password?</button></div>'+
  '<button class="bm">Sign In</button>'+
  '<div class="dt"><span>or</span></div>'+
  '<button class="bo" onclick="FR=\''+role+'\';S=\'magic_link\';R()" style="margin-bottom:10px">'+BT+' Sign in without password</button>'+
  '<button class="bo">'+GG+' Continue with Google</button>'+
  '<div style="margin-top:auto;padding:24px 0 0;text-align:center"><button onclick="S=\''+role+'_signup\';R()" style="font-size:14px;color:var(--muted);padding:8px">Don\'t have an account? <span style="color:var(--accent);font-weight:500">Sign up</span></button></div>'+
  '</div>';
}

function signupH(role){
  var isC=role==='client';
  var pid=role[0]+'s-pw';
  return '<div class="fade">'+
  '<h1 style="font-size:28px;font-weight:400;letter-spacing:-0.03em;margin:0 0 6px">'+(isC?'Create your account':'Start your business')+'</h1>'+
  '<p style="font-size:14px;color:var(--muted);margin:0 0 32px">'+(isC?'Join Kliques as a client':'Create your provider account')+'</p>'+
  '<label class="lbl">Full Name</label><input class="inp" placeholder="Your name" style="margin-bottom:20px">'+
  '<label class="lbl">Email</label><input class="inp" placeholder="you@email.com" type="email" style="margin-bottom:20px">'+
  (!isC?'<label class="lbl">Phone Number</label><input class="inp" placeholder="+1 (555) 000-0000" type="tel" style="margin-bottom:20px">':'')+
  '<label class="lbl">Password</label><div style="position:relative;margin-bottom:6px"><input class="inp" id="'+pid+'" placeholder="Create a password" type="password"><button class="pt" onclick="tP(\''+pid+'\',this)">'+EY+'</button></div>'+
  '<p style="font-size:11px;color:var(--faded);margin:0 0 24px">At least 8 characters</p>'+
  '<button class="bm">Create Account</button>'+
  '<div class="dt"><span>or</span></div>'+
  '<button class="bo">'+GG+' Sign up with Google</button>'+
  '<div style="margin-top:auto;padding:24px 0 0;text-align:center"><button onclick="S=\''+role+'_login\';R()" style="font-size:14px;color:var(--muted);padding:8px">Already have an account? <span style="color:var(--accent);font-weight:500">Sign in</span></button></div>'+
  '</div>';
}

function magicH(){
  return '<div class="fade">'+
  '<h1 style="font-size:28px;font-weight:400;letter-spacing:-0.03em;margin:0 0 6px">Sign in without password</h1>'+
  '<p style="font-size:14px;color:var(--muted);margin:0 0 32px;line-height:1.6">Enter your email and we\'ll send you a secure link. Click it and you\'re signed in — no password needed.</p>'+
  '<label class="lbl">Email</label>'+
  '<input class="inp" id="ml-email" placeholder="you@email.com" type="email">'+
  '<p class="err-msg" id="ml-err">Please enter a valid email address</p>'+
  '<div style="height:24px"></div>'+
  '<button class="bm" onclick="sendML()">Send Magic Link</button>'+
  '<div style="padding:20px 0 0;text-align:center"><p style="font-size:12px;color:var(--faded);margin:0;line-height:1.6">This also works if you forgot your password.<br>You can set a new one from your profile after signing in.</p></div>'+
  '</div>';
}

function sendML(){
  var el=document.getElementById('ml-email'),err=document.getElementById('ml-err');
  var email=el?el.value.trim():'';
  if(!vE(email)){el.classList.add('err','shake');err.classList.add('show');setTimeout(function(){el.classList.remove('shake')},300);el.focus();return}
  SE=email;S='magic_sent';R();
}

function sentH(){
  return '<div class="fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1;padding:32px 0">'+
  '<div style="width:80px;height:80px;border-radius:24px;background:var(--hero);display:flex;align-items:center;justify-content:center;margin-bottom:28px">'+EV+'</div>'+
  '<h2 style="font-size:24px;font-weight:400;letter-spacing:-0.02em;margin:0 0 10px">Check your email</h2>'+
  '<p style="font-size:15px;color:var(--muted);margin:0 0 6px;line-height:1.6">We sent a magic link to</p>'+
  '<p style="font-size:15px;font-weight:500;margin:0 0 28px">'+SE+'</p>'+
  '<div style="padding:14px 24px;background:var(--callout);border-radius:12px;margin-bottom:12px;max-width:340px"><p style="font-size:13px;color:#92400E;margin:0;line-height:1.5">Click the link to sign in instantly. The link expires in 1 hour.</p></div>'+
  '<p style="font-size:12px;color:var(--faded);margin:0 0 28px;max-width:300px;line-height:1.5">If you don\'t have an account yet, one will be created for you automatically.</p>'+
  '<div style="display:flex;flex-direction:column;gap:8px;align-items:center">'+
    '<button onclick="S=\'magic_link\';R()" style="font-size:13px;color:var(--ink);font-weight:500;padding:8px">Resend magic link</button>'+
    '<button onclick="S=FR+\'_login\';R()" style="font-size:13px;color:var(--muted);padding:8px">Sign in with password instead</button>'+
  '</div>'+
  '</div>';
}

function tP(id,btn){var i=document.getElementById(id);if(!i)return;if(i.type==='password'){i.type='text';btn.innerHTML=EO}else{i.type='password';btn.innerHTML=EY}}
document.addEventListener('input',function(e){if(e.target.id==='ml-email'){e.target.classList.remove('err');var err=document.getElementById('ml-err');if(err)err.classList.remove('show')}});
R();
</script>
</body>
</html>
