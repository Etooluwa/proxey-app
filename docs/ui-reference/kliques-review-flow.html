<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kliques — Session Complete → Review Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
:root{--base:#FBF7F2;--ink:#3D231E;--muted:#8C6A64;--faded:#B0948F;--accent:#C25E4A;--hero:#FDDCC6;--abg:#F2EBE5;--line:rgba(140,106,100,0.18);--card:#FFF;--callout:#FFF5E6;--success:#5A8A5E;--sbg:#EBF2EC}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',system-ui,sans-serif;background:#EDE6DD;color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
button{font-family:inherit;cursor:pointer;border:none;background:none}button:active{transform:scale(0.98)}
textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(194,94,74,0.1)!important}
::-webkit-scrollbar{display:none}
.topo{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 200 Q 100 100 200 200 T 400 200' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3Cpath d='M-50 250 Q 50 150 150 250 T 350 250' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3Cpath d='M50 150 Q 150 50 250 150 T 450 150' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3Cpath d='M0 300 Q 100 200 200 300 T 400 300' stroke='%233D231E' stroke-width='0.5' fill='none'/%3E%3C/svg%3E");background-size:cover;pointer-events:none}
.lbl{font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);display:block}
.div{height:1px;background:var(--line)}
.phone{width:414px;height:896px;border-radius:40px;border:1px solid var(--line);overflow:hidden;box-shadow:0 0 40px rgba(61,35,30,0.05);background:var(--base)}.phone-inner{height:100%;overflow-y:auto;display:flex;flex-direction:column}
.sw{display:flex;justify-content:center;gap:4px;margin-bottom:20px;padding:4px}
.sw button{padding:8px 16px;border-radius:9999px;font-size:11px;color:var(--muted);background:var(--abg)}.sw button.ac{background:var(--ink);color:#fff;font-weight:600}
.bm{width:100%;padding:16px;border-radius:12px;background:var(--ink);color:#fff;font-size:14px;font-weight:500;border:none;transition:opacity .15s}.bm:hover{opacity:.9}
.bo{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:transparent;font-size:13px;font-weight:500;color:var(--ink);transition:background .15s}.bo:hover{background:var(--abg)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeIn .3s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}.slideUp{animation:slideUp .4s cubic-bezier(.4,0,.2,1) both}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}.pop{animation:pop .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes confetti1{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(-60px,-120px) rotate(200deg);opacity:0}}
@keyframes confetti2{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(40px,-100px) rotate(-150deg);opacity:0}}
@keyframes confetti3{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(70px,-80px) rotate(180deg);opacity:0}}
@keyframes confetti4{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(-30px,-140px) rotate(-200deg);opacity:0}}
</style>
</head>
<body>

<div class="sw">
  <button class="ac" onclick="go('notif')">1. Notification</button>
  <button onclick="go('review')">2. Leave Review</button>
  <button onclick="go('tip')">3. Add Tip</button>
  <button onclick="go('done')">4. Thank You</button>
</div>

<div class="phone"><div class="phone-inner" id="scr"></div></div>

<script>
var step='notif', stars=0, tipPct=null, tipCustom='';

function go(s){step=s;render();document.querySelectorAll('.sw button').forEach(function(b){b.classList.toggle('ac',b.textContent.includes(s==='notif'?'1':s==='review'?'2':s==='tip'?'3':'4'))})}

function hdr(title,back){
  return '<header style="padding:32px 24px 16px;display:flex;align-items:center;gap:12px;position:relative">'+
    (back?'<button onclick="go(\''+back+'\')" style="padding:4px;display:flex"><svg width="22" height="22" fill="none" stroke="var(--ink)" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>':'')+
    '<span class="lbl" style="color:var(--ink);font-size:13px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)">'+title+'</span>'+
  '</header>';
}

function render(){
  var el=document.getElementById('scr');
  if(step==='notif') el.innerHTML=notifScreen();
  else if(step==='review') el.innerHTML=reviewScreen();
  else if(step==='tip') el.innerHTML=tipScreen();
  else if(step==='done') el.innerHTML=doneScreen();
}

function notifScreen(){
  return '<div class="fade" style="display:flex;flex-direction:column;flex:1">'+
    '<header style="padding:32px 24px 16px;display:flex;justify-content:space-between;align-items:center;position:relative">'+
      '<div style="display:flex;flex-direction:column;gap:4px;width:20px"><div style="width:20px;height:2px;background:var(--accent)"></div><div style="width:14px;height:2px;background:var(--accent)"></div><div style="width:20px;height:2px;background:var(--accent)"></div></div>'+
      '<span class="lbl" style="color:var(--accent);font-size:13px;font-weight:600;position:absolute;left:50%;transform:translateX(-50%)">Kliques</span>'+
      '<div style="display:flex;align-items:center;gap:12px"><div style="position:relative"><svg width="20" height="20" fill="none" stroke="var(--ink)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round"/></svg><div style="position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;border:2px solid var(--base)"><span style="font-size:9px;font-weight:600;color:#fff">1</span></div></div></div>'+
    '</header>'+

    '<div style="padding:0 24px 24px"><h1 style="font-size:32px;font-weight:400;letter-spacing:-0.03em;line-height:1.1;margin:0">Notifications</h1></div>'+

    '<div style="padding:0 24px;flex:1;display:flex;flex-direction:column">'+
      '<div class="div"></div>'+

      // Session complete notification — highlighted
      '<button onclick="go(\'review\')" style="display:flex;gap:14px;padding:20px 0;width:100%;text-align:left;background:transparent;transition:background .1s">'+
        '<div style="position:relative;flex-shrink:0">'+
          '<div style="width:44px;height:44px;border-radius:50%;background:var(--sbg);display:flex;align-items:center;justify-content:center">'+
            '<svg width="20" height="20" fill="none" stroke="var(--success)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          '</div>'+
          '<div style="position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--base)"></div>'+
        '</div>'+
        '<div style="flex:1">'+
          '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
            '<span style="font-size:14px;font-weight:500">Session complete</span>'+
            '<span style="font-size:11px;color:var(--faded)">Just now</span>'+
          '</div>'+
          '<p style="font-size:13px;color:var(--muted);margin:0 0 8px;line-height:1.5">Your vocal lesson with Anny Wong has been marked as complete.</p>'+
          '<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:9999px;background:var(--hero);cursor:pointer">'+
            '<svg width="12" height="12" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
            '<span style="font-size:12px;font-weight:500;color:var(--accent)">Leave a review</span>'+
          '</div>'+
        '</div>'+
      '</button>'+

      '<div class="div"></div>'+

      // Older notification
      '<div style="display:flex;gap:14px;padding:20px 0;opacity:0.6">'+
        '<div style="width:44px;height:44px;border-radius:50%;background:var(--abg);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" fill="none" stroke="var(--faded)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
        '<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:14px">Session reminder</span><span style="font-size:11px;color:var(--faded)">Yesterday</span></div><p style="font-size:13px;color:var(--muted);margin:0;line-height:1.5">Your vocal lesson with Anny is tomorrow at 10:30 AM.</p></div>'+
      '</div>'+
      '<div class="div"></div>'+
    '</div>'+
  '</div>';
}

function reviewScreen(){
  return '<div class="fade" style="display:flex;flex-direction:column;flex:1">'+
    hdr('Leave a Review','notif')+

    '<div style="padding:0 24px;flex:1;display:flex;flex-direction:column">'+

      // Provider info
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">'+
        '<div style="width:56px;height:56px;border-radius:50%;background:var(--hero);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:var(--muted)">AW</div>'+
        '<div><p style="font-size:18px;font-weight:400;letter-spacing:-0.02em;margin:0 0 3px">Anny Wong</p><p style="font-size:13px;color:var(--muted);margin:0">1-on-1 Vocal Lesson · Mar 19</p></div>'+
      '</div>'+

      // Session summary card
      '<div style="padding:16px;background:var(--abg);border-radius:14px;margin-bottom:28px">'+
        '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:14px;font-weight:500">Vocal Coaching</span><span style="font-size:14px;font-weight:500;color:var(--accent)">$85</span></div>'+
        '<p style="font-size:13px;color:var(--muted);margin:0">60 min · Wed, Mar 19 · 10:30 AM</p>'+
      '</div>'+

      '<div class="div"></div>'+

      // Star rating
      '<div style="padding:24px 0;text-align:center">'+
        '<p style="font-size:16px;font-weight:400;margin:0 0 16px">How was your session?</p>'+
        '<div style="display:flex;justify-content:center;gap:8px" id="starRow">'+
          starButtons()+
        '</div>'+
        '<p style="font-size:13px;color:var(--faded);margin:12px 0 0;min-height:18px" id="starLabel">'+starLabel()+'</p>'+
      '</div>'+

      '<div class="div"></div>'+

      // Written review
      '<div style="padding:24px 0">'+
        '<span class="lbl" style="margin-bottom:8px">Write a review (optional)</span>'+
        '<textarea placeholder="What stood out? How did Anny help you?" rows="4" style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);font-family:inherit;font-size:13px;color:var(--ink);resize:vertical;outline:none;background:var(--abg);box-sizing:border-box"></textarea>'+
        '<p style="font-size:11px;color:var(--faded);margin:6px 0 0;text-align:right">Max 500 characters</p>'+
      '</div>'+

      '<div style="margin-top:auto;padding:0 0 28px;display:flex;gap:10px">'+
        '<button class="bm" onclick="go(\'tip\')"'+(stars===0?' style="opacity:0.4;pointer-events:none;width:100%;padding:16px;border-radius:12px;background:var(--ink);color:#fff;font-size:14px;font-weight:500;border:none"':'')+'>Continue</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function tipScreen(){
  var base=85;
  var tips=[{pct:15,amt:Math.round(base*0.15)},{pct:20,amt:Math.round(base*0.20)},{pct:25,amt:Math.round(base*0.25)}];
  var tipAmt=tipPct?tips.find(function(t){return t.pct===tipPct}):null;
  var finalTip=tipPct==='custom'?(tipCustom?'$'+tipCustom:'$0'):(tipAmt?'$'+tipAmt.amt:'$0');
  var total=tipPct==='custom'?(base+(parseInt(tipCustom)||0)):(tipAmt?base+tipAmt.amt:base);

  return '<div class="fade" style="display:flex;flex-direction:column;flex:1">'+
    hdr('Add a Tip','review')+

    '<div style="padding:0 24px;flex:1;display:flex;flex-direction:column">'+

      // Provider
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">'+
        '<div style="width:48px;height:48px;border-radius:50%;background:var(--hero);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:var(--muted)">AW</div>'+
        '<div><p style="font-size:16px;font-weight:400;margin:0 0 2px">Anny Wong</p><p style="font-size:13px;color:var(--muted);margin:0">Vocal Coaching · $85</p></div>'+
      '</div>'+

      '<div class="div"></div>'+

      '<div style="padding:24px 0;text-align:center">'+
        '<p style="font-size:16px;font-weight:400;margin:0 0 6px">Would you like to leave a tip?</p>'+
        '<p style="font-size:13px;color:var(--muted);margin:0 0 24px">Tips go directly to Anny — Kliques takes nothing.</p>'+

        // Tip presets
        '<div style="display:flex;gap:8px;margin-bottom:16px">'+
          tips.map(function(t){
            var sel=tipPct===t.pct;
            return '<button onclick="tipPct='+(sel?'null':t.pct)+';tipCustom=\'\';render()" style="flex:1;padding:16px 8px;border-radius:14px;border:'+(sel?'2px solid var(--accent)':'1px solid var(--line)')+';background:'+(sel?'var(--hero)':'transparent')+';text-align:center"><span style="font-size:20px;font-weight:400;letter-spacing:-0.03em;color:'+(sel?'var(--accent)':'var(--ink)')+';display:block;margin-bottom:2px">$'+t.amt+'</span><span style="font-size:11px;color:'+(sel?'var(--accent)':'var(--faded)')+'">'+t.pct+'%</span></button>';
          }).join('')+
        '</div>'+

        // Custom tip
        '<div style="margin-bottom:16px">'+
          '<button onclick="tipPct=\'custom\';render()" style="width:100%;padding:14px;border-radius:14px;border:'+(tipPct==='custom'?'2px solid var(--accent)':'1px solid var(--line)')+';background:'+(tipPct==='custom'?'var(--hero)':'transparent')+';font-size:13px;font-weight:500;color:'+(tipPct==='custom'?'var(--accent)':'var(--ink)')+';display:flex;align-items:center;justify-content:center;gap:6px">'+
            '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>'+
            'Custom amount'+
          '</button>'+
        '</div>'+

        (tipPct==='custom'?
          '<div style="margin-bottom:16px"><div style="position:relative"><span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted)">$</span><input id="customTip" value="'+tipCustom+'" oninput="tipCustom=this.value;render()" type="number" min="1" placeholder="0" style="width:100%;padding:14px 16px 14px 32px;border-radius:12px;border:1px solid var(--line);font-family:inherit;font-size:16px;color:var(--ink);outline:none;background:var(--abg);box-sizing:border-box"></div></div>'
        :'')+

        // No tip option
        '<button onclick="tipPct=null;tipCustom=\'\';render()" style="font-size:13px;color:var(--faded);padding:8px;margin-bottom:8px">No tip this time</button>'+
      '</div>'+

      '<div class="div"></div>'+

      // Total
      '<div style="padding:20px 0;display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-size:14px;color:var(--muted)">Session total + tip</span>'+
        '<span style="font-size:22px;font-weight:400;letter-spacing:-0.03em;color:var(--accent)">$'+total+'</span>'+
      '</div>'+

      '<div style="margin-top:auto;padding:0 0 28px">'+
        '<button class="bm" onclick="go(\'done\')">Submit Review'+(tipPct?' & Tip':'')+'</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function doneScreen(){
  return '<div class="fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;text-align:center;position:relative;overflow:hidden">'+

    // Confetti particles
    '<div style="position:absolute;top:40%;left:50%;pointer-events:none">'+
      '<div style="width:8px;height:8px;border-radius:2px;background:var(--accent);position:absolute;animation:confetti1 .8s ease .2s both"></div>'+
      '<div style="width:6px;height:6px;border-radius:50%;background:var(--hero);position:absolute;animation:confetti2 .8s ease .3s both"></div>'+
      '<div style="width:8px;height:8px;border-radius:2px;background:var(--success);position:absolute;animation:confetti3 .8s ease .25s both"></div>'+
      '<div style="width:6px;height:6px;border-radius:50%;background:var(--callout);position:absolute;animation:confetti4 .8s ease .35s both"></div>'+
      '<div style="width:8px;height:8px;border-radius:2px;background:var(--accent);position:absolute;animation:confetti3 .8s ease .15s both;left:-20px"></div>'+
      '<div style="width:6px;height:6px;border-radius:50%;background:var(--success);position:absolute;animation:confetti1 .8s ease .4s both;left:30px"></div>'+
    '</div>'+

    // Success icon
    '<div class="pop" style="width:80px;height:80px;border-radius:24px;background:var(--sbg);display:flex;align-items:center;justify-content:center;margin-bottom:28px">'+
      '<svg width="36" height="36" fill="none" stroke="var(--success)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
    '</div>'+

    '<h1 style="font-size:24px;font-weight:400;letter-spacing:-0.02em;margin:0 0 10px">Thank you!</h1>'+
    '<p style="font-size:15px;color:var(--muted);margin:0 0 8px;line-height:1.6;max-width:300px">Your review has been submitted'+
      (tipPct?' and your tip has been sent to Anny.':' for Anny Wong.')+
    '</p>'+

    // Stars display
    '<div style="display:flex;justify-content:center;gap:4px;margin:20px 0">'+
      [1,2,3,4,5].map(function(i){
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="'+(i<=stars?'var(--accent)':'none')+'" stroke="'+(i<=stars?'var(--accent)':'var(--faded)')+'" stroke-width="1.5"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }).join('')+
    '</div>'+

    (tipPct?
      '<div style="padding:12px 20px;background:var(--callout);border-radius:12px;margin-bottom:28px"><p style="font-size:14px;color:#92400E;margin:0;font-weight:500">Tip: '+(tipPct==='custom'?'$'+tipCustom:'$'+(Math.round(85*(tipPct/100))))+'</p></div>'
    :'')+

    '<div style="width:100%;max-width:300px">'+
      '<button class="bm" style="margin-bottom:10px">Back to My Kliques</button>'+
      '<button class="bo">Book Again with Anny</button>'+
    '</div>'+
  '</div>';
}

function starButtons(){
  var h='';
  for(var i=1;i<=5;i++){
    var filled=i<=stars;
    h+='<button onclick="stars='+i+';render()" style="padding:4px;transition:transform .15s"><svg width="36" height="36" viewBox="0 0 24 24" fill="'+(filled?'var(--accent)':'none')+'" stroke="'+(filled?'var(--accent)':'var(--faded)')+'" stroke-width="1.5"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';
  }
  return h;
}

function starLabel(){
  var labels=['','Not great','Could be better','Good session','Great session','Amazing!'];
  return stars>0?labels[stars]:'Tap a star to rate';
}

render();
